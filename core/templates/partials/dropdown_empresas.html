<form method="post" action="{% url 'trocar_empresa' %}" class="site-nav__empresa-form">
    {% csrf_token %}
    <i class="bi bi-building site-nav__empresa-icon"></i>
    <select name="empresa_id" class="site-nav__empresa-select" onchange="this.form.submit()">
        {% for emp in empresas_disponiveis %}
            <option value="{{ emp.id }}"
                {% if request.empresa_ativa and request.empresa_ativa.id == emp.id %}
                    selected
                {% endif %}
            >
                {{ emp.nome }}
            </option>
        {% endfor %}
    </select>
    <i class="bi bi-chevron-down site-nav__empresa-chevron"></i>
</form>
